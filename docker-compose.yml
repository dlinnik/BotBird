services:
  birdbot:
    build: .
    ports:
      - "4100:4100"
    volumes:
      - birdbot-uploads:/data/birdbot/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: 4100
      MONGO_URL: ${MONGO_URL:?Set MONGO_URL in .env}
      UPLOAD_DIR: /data/birdbot/uploads
      WIDGET_DIR: /app/dist/widget
      EMBED_DIR: /app/dist/embed
      DEMO_DIR: /app/demo
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      DEMO_JWT: ${DEMO_JWT:-}
      JWT_USER_ID_CLAIM: ${JWT_USER_ID_CLAIM:-id}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_GROUP_ID: ${TELEGRAM_GROUP_ID:-}
      TELEGRAM_PROXY_URL: ${TELEGRAM_PROXY_URL:-}
      TELEGRAM_HTTP_PROXY: ${TELEGRAM_HTTP_PROXY:-}
      TELEGRAM_HTTP_PROXY_HOST: ${TELEGRAM_HTTP_PROXY_HOST:-}
      TELEGRAM_HTTP_PROXY_PORT: ${TELEGRAM_HTTP_PROXY_PORT:-}
      TELEGRAM_HTTP_PROXY_USER: ${TELEGRAM_HTTP_PROXY_USER:-}
      TELEGRAM_HTTP_PROXY_PASSWORD: ${TELEGRAM_HTTP_PROXY_PASSWORD:-}

volumes:
  birdbot-uploads:
